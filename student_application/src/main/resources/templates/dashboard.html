<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .add-btn {
            display: inline-block;
            padding: 10px 15px;
            margin-bottom: 15px;
            background-color: #148d60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .add-btn:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .edit-btn {
            color: blue;
            text-decoration: none;
            margin-right: 10px;
        }

        .delete-btn {
            color: red;
            text-decoration: none;
        }

        .edit-btn:hover {
            text-decoration: underline;
        }

        .delete-btn:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Student List</h2>

    <a href="/add" class="add-btn">+ Add Student</a>

    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Action</th>
        </tr>

        <tr th:each="s : ${students}">
            <td th:text="${s.name}"></td>
            <td th:text="${s.email}"></td>
            <td th:text="${s.course}"></td>
            <td>
                <a th:href="@{/edit/{id}(id=${s.id})}" class="edit-btn">Edit</a>
                <a th:href="@{/delete/{id}(id=${s.id})}" class="delete-btn">Delete</a>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
