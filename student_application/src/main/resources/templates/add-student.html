<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            margin-left: 5px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #555;
        }

        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

<div class="form-box">
    <h2>Add Student</h2>

    <form action="/save" method="post">
        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter name">

        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter email">

        <label>Course:</label>
        <input type="text" name="course" placeholder="Enter course">

        <button type="submit">Save</button>
    </form>

    <a href="/dashboard" class="cancel-link">Cancel</a>
</div>

</body>
</html>
